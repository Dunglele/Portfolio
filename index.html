<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Quang Dũng Portfolio!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            /* Nền chấm bi chuẩn phong cách comic */
            background-color: #fde047; /* Vàng rực */
            background-image: radial-gradient(#000 2px, transparent 2px);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        /* Viền đen dày và đổ bóng cứng */
        .comic-border {
            border: 4px solid #000;
            box-shadow: 8px 8px 0px #000;
        }

        /* Chữ có viền và bóng */
        .comic-text-shadow {
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 6px  6px 0 #000;
        }

        .comic-text-light {
            text-shadow: 2px 2px 0px #000;
        }

        /* Hiệu ứng bay lơ lửng */
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }

        .float-anim-delay-1 { animation: float 4s ease-in-out infinite 0.5s; }
        .float-anim-delay-2 { animation: float 3.5s ease-in-out infinite 1s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Hiệu ứng rung lắc nhẹ khi hover */
        .shake:hover {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative select-none p-4">

    <!-- Đồ vật bay lơ lửng xung quanh -->
    <div class="absolute top-10 left-10 md:left-32 text-6xl float-anim cursor-pointer" onclick="createEmojis('🛸')">🛸</div>
    <div class="absolute bottom-20 right-10 md:right-32 text-6xl float-anim-delay-1 cursor-pointer" onclick="createEmojis('🍕')">🍕</div>
    <div class="absolute top-20 right-10 md:right-40 text-5xl float-anim-delay-2 cursor-pointer" onclick="createEmojis('🎨')">🎨</div>
    <div class="absolute bottom-10 left-10 md:left-40 text-7xl float-anim cursor-pointer" onclick="createEmojis('🚧')">🚧</div>
    <div class="absolute top-1/2 left-4 text-5xl float-anim-delay-1 hidden md:block">☕</div>
    <div class="absolute top-1/3 right-4 text-6xl float-anim hidden md:block">🔨</div>

    <!-- Khung nội dung chính -->
    <div class="bg-white max-w-3xl w-full p-8 md:p-12 rounded-[3rem] comic-border text-center relative z-10 transform transition-transform hover:scale-[1.02] duration-300">
        
        <!-- Mascot -->
        <div id="mascot" class="text-8xl md:text-9xl mb-2 float-anim mx-auto cursor-pointer transition-transform duration-200 inline-block shake" title="Nhấn vào tôi đi!">
            👾
        </div>

        <h1 class="text-7xl md:text-9xl font-black text-pink-500 comic-text-shadow tracking-widest mb-4">404</h1>
        
        <h2 class="text-2xl md:text-4xl font-bold text-black mb-4 uppercase comic-text-light text-white" style="color: #3b82f6;">
            Cảnh Báo: Đi Vào Lòng Đất!
        </h2>
        
        <p class="text-lg md:text-xl text-gray-800 font-semibold mb-8 leading-relaxed">
            Bạn vừa vấp phải một lỗ hổng không gian mạng! 🕳️ <br class="hidden md:block"/>
            Trang bạn tìm không tồn tại, nhưng đừng hoảng hốt... <br/>
            <span class="text-pink-600 font-bold text-xl bg-pink-100 px-2 py-1 rounded-lg border-2 border-black inline-block mt-2 transform rotate-1">
                Siêu Cấp Portfolio
            </span> 
            của tôi đang được chắp bút và sẽ sớm "lên sóng"! 🔥🚀
        </p>

        <!-- Khu vực nút bấm -->
        <div class="flex flex-col md:flex-row justify-center items-center gap-4 relative">
            <button id="waitBtn" class="w-full md:w-auto bg-blue-400 hover:bg-blue-500 text-white px-8 py-4 rounded-full font-bold text-xl comic-border transition-transform transform hover:-translate-y-2 active:scale-95 z-20">
                Tôi Sẽ Lót Dép Hóng! 🩴
            </button>
            
            <!-- Nút troll bọc trong div để không làm hỏng layout khi nó chạy -->
            <div class="w-full md:w-auto relative h-[68px] flex justify-center items-center">
                <button id="trollBtn" class="bg-green-400 text-black px-8 py-4 rounded-full font-bold text-xl comic-border transition-all duration-200 z-30 whitespace-nowrap">
                    Về Trang Chủ 🏠
                </button>
            </div>
        </div>
    </div>

    <!-- Script xử lý tương tác -->
    <script>
        // 1. Đổi mặt Mascot khi click
        const mascot = document.getElementById('mascot');
        const faces = ['👾', '🤯', '🙈', '🛠️', '🤪', '👻', '💻', '✨'];
        let faceIndex = 0;

        mascot.addEventListener('click', () => {
            faceIndex = (faceIndex + 1) % faces.length;
            mascot.innerText = faces[faceIndex];
            mascot.style.transform = 'scale(1.3) rotate(10deg)';
            setTimeout(() => {
                mascot.style.transform = '';
            }, 200);
            createEmojis(faces[faceIndex]);
        });

        // 2. Logic cho Nút Lót Dép Hóng
        const waitBtn = document.getElementById('waitBtn');
        waitBtn.addEventListener('click', () => {
            waitBtn.innerText = "Cảm Ơn Nhé!!! ❤️";
            waitBtn.classList.remove('bg-blue-400', 'hover:bg-blue-500');
            waitBtn.classList.add('bg-pink-400', 'hover:bg-pink-500');
            
            showToast("Tuyệt vời! Tôi sẽ tăng tốc độ code lên 200%! ⌨️💨");
            
            // Thả tim
            for(let i=0; i<15; i++) {
                setTimeout(() => createEmojis('💖'), i * 100);
            }
        });

        // 3. Logic cho Nút Troll (Chạy trốn con trỏ chuột)
        const trollBtn = document.getElementById('trollBtn');
        let trollCount = 0;
        const messages = ["Đố bắt được! 😜", "Nhanh tay lên! 🏃💨", "Lêu Lêu! 👅", "Thôi tha cho đó! 🛑"];

        // Chỉ troll trên thiết bị có chuột (không dùng touch để tránh khó chịu trên mobile)
        window.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 768) return; // Bỏ qua trên mobile
            
            if (trollCount < 3) {
                const btnRect = trollBtn.getBoundingClientRect();
                const mouseX = e.clientX;
                const mouseY = e.clientY;
                
                // Khoảng cách từ chuột đến nút
                const distX = mouseX - (btnRect.left + btnRect.width / 2);
                const distY = mouseY - (btnRect.top + btnRect.height / 2);
                const distance = Math.sqrt(distX * distX + distY * distY);

                if (distance < 100) {
                    // Chạy ngẫu nhiên
                    const moveX = (Math.random() - 0.5) * 300;
                    const moveY = (Math.random() - 0.5) * 300;
                    
                    trollBtn.style.transform = `translate(${moveX}px, ${moveY}px) scale(0.9) rotate(${Math.random()*20-10}deg)`;
                    trollBtn.innerText = messages[trollCount];
                    trollCount++;
                }
            } else if (trollCount === 3) {
                trollBtn.style.transform = `translate(0px, 0px) scale(1)`;
                trollBtn.innerText = messages[3];
                trollCount++; // Dừng troll
            }
        });

        trollBtn.addEventListener('click', () => {
            showToast("Ủa quên mất... Đã làm xong trang chủ đâu mà về! 🤡");
            trollBtn.innerText = "Bị Lừa Rồi! 😂";
            trollBtn.classList.replace('bg-green-400', 'bg-gray-400');
            trollBtn.style.pointerEvents = 'none';
        });

        // 4. Hàm tạo Emoji bay lượn (Hiệu ứng)
        function createEmojis(emoji) {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = 'fixed text-4xl pointer-events-none z-50';
            
            // Bắt đầu từ giữa màn hình hoặc vị trí ngẫu nhiên
            el.style.left = Math.random() * 80 + 10 + 'vw';
            el.style.top = '100vh';
            el.style.transition = 'all 2s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            
            document.body.appendChild(el);

            // Kích hoạt bay lên
            setTimeout(() => {
                el.style.top = '-10vh';
                el.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() * 1.5 + 0.5})`;
                el.style.opacity = '0';
            }, 50);

            // Xóa phần tử sau khi bay xong
            setTimeout(() => el.remove(), 2000);
        }

        // 5. Hệ thống Toast Message (Thông báo góc trên) thay thế cho alert()
        function showToast(msg) {
            // Xóa toast cũ nếu có
            const oldToast = document.getElementById('custom-toast');
            if(oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-white comic-border px-6 py-4 rounded-2xl font-bold text-xl text-black z-50 transition-all duration-300 shadow-xl opacity-0 translate-y-[-20px] text-center w-11/12 max-w-md';
            toast.innerText = msg;
            document.body.appendChild(toast);

            // Hiện toast
            setTimeout(() => {
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, 0)';
            }, 10);

            // Ẩn toast sau 3.5s
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
